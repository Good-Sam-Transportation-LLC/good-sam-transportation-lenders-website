name: Claude PR Auto-Fix

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_run:
    # NOTE: If you rename either of these workflows, update the skip check in
    # the "Wait for Copilot SWE to finish" step below to match.
    workflows: ["Trigger Copilot Coding Agent", "Copilot Recursive Review Loop"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  auto-fix:
    name: Auto-Fix PR Issues with Claude
    runs-on: ubuntu-latest
    # For workflow_run: only run if the trigger workflow succeeded
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check for API key
        id: check-key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY is not set — skipping Claude auto-fix."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Copilot SWE to finish
        if: steps.check-key.outputs.skip == 'false' && github.event_name == 'workflow_run'
        id: wait-for-swe
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // When triggered by the Copilot Recursive Review Loop, the loop has already
            // completed its own review/fix cycle (commits are by github-actions[bot], not
            // Copilot SWE). Skip the SWE polling so we don't wait until timeout.
            const triggeringWorkflow = context.payload.workflow_run.name;
            if (triggeringWorkflow === 'Copilot Recursive Review Loop') {
              console.log(`Triggered by "${triggeringWorkflow}" — skipping SWE polling, proceeding immediately.`);
              core.setOutput('proceed', 'true');
              return;
            }

            // Find the PR for this branch
            const headBranch = context.payload.workflow_run.head_branch;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${headBranch}`,
              state: 'open',
            });
            if (prs.length === 0) {
              console.log(`No open PR for branch ${headBranch} — skipping.`);
              core.setOutput('proceed', 'false');
              return;
            }
            const pr = prs[0];
            const prNumber = pr.number;

            // Check if copilot is assigned (trigger-copilot-agent assigns it)
            const copilotAssigned = pr.assignees.some(
              a => a.login.toLowerCase().includes('copilot')
            );
            if (!copilotAssigned) {
              console.log(`Copilot is not assigned to PR #${prNumber} — proceeding immediately.`);
              core.setOutput('proceed', 'true');
              return;
            }

            // Copilot is assigned — poll until it pushes commits
            // Record the SHA at the time the trigger workflow started
            const triggerSha = context.payload.workflow_run.head_sha;
            const MAX_WAIT_MS = 15 * 60 * 1000; // 15 minutes
            const POLL_MS = 30 * 1000; // 30 seconds
            const start = Date.now();

            console.log(`Copilot is assigned to PR #${prNumber}. Waiting for SWE to push commits (baseline SHA: ${triggerSha})...`);

            while (Date.now() - start < MAX_WAIT_MS) {
              await new Promise(r => setTimeout(r, POLL_MS));

              // Get the current head SHA of the PR branch
              const { data: branch } = await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: headBranch,
              });
              const currentSha = branch.commit.sha;

              if (currentSha !== triggerSha) {
                // New commits were pushed — check if any are from copilot
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: triggerSha,
                  head: currentSha,
                });
                const copilotCommits = comparison.commits.filter(c => {
                  const author = (c.author?.login || '').toLowerCase();
                  const committer = (c.committer?.login || '').toLowerCase();
                  const authorName = (c.commit?.author?.name || '').toLowerCase();
                  return author.includes('copilot') ||
                         committer.includes('copilot') ||
                         authorName.includes('copilot');
                });
                if (copilotCommits.length > 0) {
                  console.log(`Copilot SWE pushed ${copilotCommits.length} commit(s). Waiting for CI to pass on those commits...`);

                  // Now wait for CI to complete on the new head
                  const CI_WAIT_MS = 10 * 60 * 1000;
                  const ciStart = Date.now();
                  while (Date.now() - ciStart < CI_WAIT_MS) {
                    await new Promise(r => setTimeout(r, POLL_MS));
                    const { data: checkRuns } = await github.rest.checks.listForRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: currentSha,
                      filter: 'latest',
                    });
                    const ciRun = checkRuns.check_runs.find(cr => cr.name === 'CI' || cr.name === 'build');
                    if (ciRun && ciRun.status === 'completed') {
                      if (ciRun.conclusion === 'success') {
                        console.log('CI passed on Copilot commits — proceeding with Claude autofix.');
                        core.setOutput('proceed', 'true');
                        return;
                      } else {
                        console.log(`CI ${ciRun.conclusion} on Copilot commits — skipping autofix.`);
                        core.setOutput('proceed', 'false');
                        return;
                      }
                    }
                    const elapsed = Math.round((Date.now() - ciStart) / 1000);
                    console.log(`Waiting for CI on Copilot commits... (${elapsed}s)`);
                  }
                  console.log('Timed out waiting for CI on Copilot commits — proceeding anyway.');
                  core.setOutput('proceed', 'true');
                  return;
                }
              }

              const elapsed = Math.round((Date.now() - start) / 1000);
              console.log(`Still waiting for Copilot SWE to push... (${elapsed}s)`);
            }

            console.log('Timed out waiting for Copilot SWE — skipping.');
            core.setOutput('proceed', 'false');

      - name: Determine if we should proceed
        id: should-proceed
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=${{ steps.wait-for-swe.outputs.proceed }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-key.outputs.skip == 'false' && steps.should-proceed.outputs.proceed == 'true'
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.check-key.outputs.skip == 'false' && steps.should-proceed.outputs.proceed == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check-key.outputs.skip == 'false' && steps.should-proceed.outputs.proceed == 'true'
        run: npm ci

      - name: Collect unresolved review threads and apply fixes
        if: steps.check-key.outputs.skip == 'false' && steps.should-proceed.outputs.proceed == 'true'
        id: apply-fixes
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Resolve PR number from whichever event fired
            const isPRReview = context.eventName === 'pull_request_review';
            const isPRReviewComment = context.eventName === 'pull_request_review_comment';
            const isWorkflowRun = context.eventName === 'workflow_run';

            let prNumber;
            if (isWorkflowRun) {
              // Find the PR associated with the workflow_run head branch
              const headBranch = context.payload.workflow_run.head_branch;
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${headBranch}`,
                state: 'open',
              });
              if (prs.length === 0) {
                console.log(`No open PR found for branch ${headBranch} — skipping.`);
                core.setOutput('changed', 'false');
                return;
              }
              prNumber = prs[0].number;
              console.log(`CI completed on branch ${headBranch} — found PR #${prNumber}`);
            } else {
              prNumber = context.payload.pull_request.number;
            }

            // For single-comment events, we only process the new comment
            if (isPRReviewComment) {
              const comment = context.payload.comment;
              const body = comment.body || '';
              const suggestionRegex = /```suggestion\n([\s\S]*?)```/g;
              const suggestions = [];
              let match;
              while ((match = suggestionRegex.exec(body)) !== null) {
                suggestions.push(match[1]);
              }

              if (suggestions.length === 0) {
                console.log('No suggestion blocks in this comment — skipping.');
                core.setOutput('changed', 'false');
                return;
              }

              const filePath = comment.path;
              const endLine = comment.line;
              const startLine = comment.start_line || comment.line;
              const replacementCode = suggestions[0];

              const lines = fs.readFileSync(filePath, 'utf8').split('\n');
              const before = lines.slice(0, startLine - 1);
              const after = lines.slice(endLine);
              const replacementLines = replacementCode.split('\n');
              if (replacementLines[replacementLines.length - 1] === '') replacementLines.pop();
              const updated = [...before, ...replacementLines, ...after].join('\n');
              fs.writeFileSync(filePath, updated);
              console.log(`Applied suggestion to ${filePath} (lines ${startLine}–${endLine})`);
              core.setOutput('changed', 'true');
              return;
            }

            // For full review submissions, collect all unresolved threads
            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        comments(first: 20) {
                          nodes {
                            body
                            path
                            line
                            startLine
                            author { login }
                            diffHunk
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prNumber,
            });

            const unresolvedThreads = repository.pullRequest.reviewThreads.nodes.filter(
              t => !t.isResolved
            );

            if (unresolvedThreads.length === 0) {
              console.log('No unresolved review threads found.');
              core.setOutput('changed', 'false');
              return;
            }

            console.log(`Found ${unresolvedThreads.length} unresolved thread(s).`);
            let anyChanged = false;

            for (const thread of unresolvedThreads) {
              const firstComment = thread.comments.nodes[0];
              if (!firstComment || !firstComment.path) continue;

              const body = firstComment.body || '';
              const filePath = firstComment.path;
              const endLine = firstComment.line;
              const startLine = firstComment.startLine || firstComment.line;

              // Check for explicit suggestion block first
              const suggestionRegex = /```suggestion\n([\s\S]*?)```/g;
              const suggestions = [];
              let match;
              while ((match = suggestionRegex.exec(body)) !== null) {
                suggestions.push(match[1]);
              }

              if (suggestions.length > 0) {
                // Apply suggestion block directly
                if (!fs.existsSync(filePath)) {
                  console.log(`File not found: ${filePath} — skipping`);
                  continue;
                }
                const lines = fs.readFileSync(filePath, 'utf8').split('\n');
                const before = lines.slice(0, startLine - 1);
                const after = lines.slice(endLine);
                const replacementLines = suggestions[0].split('\n');
                if (replacementLines[replacementLines.length - 1] === '') replacementLines.pop();
                const updated = [...before, ...replacementLines, ...after].join('\n');
                fs.writeFileSync(filePath, updated);
                console.log(`Applied suggestion block to ${filePath} (lines ${startLine}–${endLine})`);
                anyChanged = true;
                continue;
              }

              // Free-text comment — use Claude to understand and apply fix
              if (!fs.existsSync(filePath)) {
                console.log(`File not found: ${filePath} — skipping free-text fix`);
                continue;
              }

              const fileContent = fs.readFileSync(filePath, 'utf8');
              const fileLines = fileContent.split('\n');
              // Show surrounding context (10 lines before/after)
              const ctxStart = Math.max(0, (startLine || 1) - 11);
              const ctxEnd = Math.min(fileLines.length, (endLine || 1) + 10);
              const codeSnippet = fileLines.slice(ctxStart, ctxEnd)
                .map((l, i) => `${ctxStart + i + 1}: ${l}`)
                .join('\n');

              const diffContext = firstComment.diffHunk || '';

              const prompt = [
                'You are a code reviewer\'s assistant. A reviewer left a comment on a file asking for a change. Apply the change directly to the full file content and return ONLY the complete updated file content — no explanations, no markdown code fences, no diff format.',
                '',
                `File: ${filePath}`,
                '',
                `Reviewer's comment (about lines ${startLine}–${endLine}):`,
                body,
                '',
                'Diff context (the exact code block being reviewed):',
                '```diff',
                diffContext,
                '```',
                '',
                `Relevant code snippet (lines ${ctxStart + 1}–${ctxEnd}):`,
                '```',
                codeSnippet,
                '```',
                '',
                'Full current file content:',
                '```',
                fileContent,
                '```',
                '',
                'Return ONLY the complete updated file content with the reviewer\'s requested change applied. Do not include any explanation or markdown fencing.',
              ].join('\n');

              let updatedContent;
              try {
                const MAX_API_RETRIES = 3;
                const API_BACKOFF_DELAYS = [30000, 60000, 120000]; // 30s, 60s, 120s
                let response;
                let apiSuccess = false;

                for (let apiAttempt = 0; apiAttempt <= MAX_API_RETRIES; apiAttempt++) {
                  response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'x-api-key': process.env.ANTHROPIC_API_KEY,
                      'anthropic-version': '2023-06-01',
                    },
                    body: JSON.stringify({
                      model: 'claude-sonnet-4-6',
                      max_tokens: 8192,
                      messages: [{ role: 'user', content: prompt }],
                    }),
                  });

                  if (response.ok) {
                    apiSuccess = true;
                    break;
                  }

                  if (response.status === 429 && apiAttempt < MAX_API_RETRIES) {
                    const delay = API_BACKOFF_DELAYS[apiAttempt];
                    console.log(`Claude API rate-limited (429). Retrying in ${delay / 1000}s... (attempt ${apiAttempt + 1}/${MAX_API_RETRIES})`);
                    await new Promise(res => setTimeout(res, delay));
                    continue;
                  }

                  const err = await response.text();
                  console.log(`Claude API error (${response.status}): ${err} — skipping ${filePath}`);
                  break;
                }

                if (!apiSuccess) continue;

                const data = await response.json();
                updatedContent = data.content[0].text;

                // Strip markdown code fences if Claude wrapped the output
                const fenceMatch = updatedContent.match(/^```[^\n]*\n([\s\S]*?)```\s*$/);
                if (fenceMatch) updatedContent = fenceMatch[1];

              } catch (err) {
                console.log(`Claude API call failed for ${filePath}: ${err.message} — skipping`);
                continue;
              }

              if (updatedContent && updatedContent !== fileContent) {
                fs.writeFileSync(filePath, updatedContent);
                console.log(`Claude applied free-text fix to ${filePath}`);
                anyChanged = true;
              } else {
                console.log(`No change produced by Claude for ${filePath}`);
              }
            }

            core.setOutput('changed', anyChanged ? 'true' : 'false');

      - name: Run lint and tests
        if: steps.apply-fixes.outputs.changed == 'true'
        run: |
          npm run lint || { echo "::warning::Lint failed after applying fixes — committing anyway"; }
          npm test || { echo "::warning::Tests failed after applying fixes — committing anyway"; }

      - name: Commit and push fixes
        if: steps.apply-fixes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "fix: auto-apply PR review suggestions via Claude"
            bash .github/scripts/push-with-scan-wait.sh
          fi

      - name: React to applied review
        if: steps.apply-fixes.outputs.changed == 'true' && github.event_name == 'pull_request_review_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.reactions.createForPullRequestReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });
            } catch (e) {
              console.log('Could not add reaction:', e.message);
            }
