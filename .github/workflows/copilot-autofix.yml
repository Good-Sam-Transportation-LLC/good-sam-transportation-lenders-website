name: Copilot Autofix

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-apply-suggestions:
    name: Auto-Apply Copilot Suggestions
    if: github.event.comment.user.login == 'copilot[bot]' || github.event.comment.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply suggestion from Copilot comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment;
            const body = comment.body || '';

            // Extract suggestion blocks from comment
            const suggestionRegex = /```suggestion\n([\s\S]*?)```/g;
            const suggestions = [];
            let match;
            while ((match = suggestionRegex.exec(body)) !== null) {
              suggestions.push(match[1]);
            }

            if (suggestions.length === 0) {
              console.log('No suggestion blocks found in comment, skipping.');
              return;
            }

            // Use GitHub API to apply the suggestion
            const prNumber = context.payload.pull_request.number;
            const commentId = comment.id;

            try {
              // Apply the suggestion via the API
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'COMMENT',
                body: 'Auto-applying Copilot suggestion.'
              });

              // Commit the suggestion using the suggestions API
              await github.rest.pulls.applySuggestion({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                comment_id: commentId,
                commit_message: 'Apply Copilot suggestion'
              });

              console.log(`Applied suggestion from comment ${commentId}`);
            } catch (error) {
              console.error(`Failed to apply suggestion: ${error.message}`);
              // If the API method doesn't exist, try alternative approach
              // The suggestion may need to be applied manually via file edit
              console.log('Suggestion application via API failed, this may need manual review.');
            }

      - name: React to applied comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.reactions.createForPullRequestReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket'
              });
            } catch (e) {
              console.log('Could not add reaction:', e.message);
            }
