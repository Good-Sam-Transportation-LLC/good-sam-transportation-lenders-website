name: Request Copilot Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  request-review:
    name: Request Copilot as Reviewer
    runs-on: ubuntu-latest
    # Skip fork PRs: repository secrets (COPILOT_PAT) are unavailable on forks,
    # so the github-script step would fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Request Copilot code review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const prNumber = context.payload.pull_request.number;

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ['copilot'],
              });
              console.log(`Requested Copilot review on PR #${prNumber}`);
            } catch (error) {
              // GitHub returns a 422 if the reviewer is already assigned or unavailable.
              // This is not a fatal error — log it and continue.
              console.log(`Could not request Copilot review: ${error.message}`);
            }
